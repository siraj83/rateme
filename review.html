<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تقييم المطعم – Rate Me</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body style="display: block !important; width: 100%; min-height: 100vh;">

  <!-- Main Content -->
  <main class="public-main">

    <!-- Restaurant Info -->
    <div class="card" id="restaurantInfo" style="text-align:center; display:none;">
      <img id="restaurantLogo" src="" alt="Logo"
        style="width:100px; height:100px; border-radius:50%; margin-bottom:15px; object-fit:cover;">
      <h1 id="restaurantName" style="margin-bottom:10px;"></h1>
      <p id="restaurantDesc" style="color:var(--text-muted);"></p>
      <p class="welcome-message">
        ساعدنا في تحسين الخدمة من خلال تقييم تجربتك ❤️
      </p>
    </div>
    <!-- Products Grid -->
    <div id="productsGrid">
      <!-- Products render here -->
    </div>

  </main>

  <!-- Review Modal -->
  <div class="modal" id="reviewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>أضف تقييمك</h3>
        <button class="close-modal" id="closeReview">&times;</button>
      </div>
      <form id="reviewForm">
        <input type="hidden" id="reviewProdId">
        <div class="form-group">
          <label>اسمك</label>
          <input type="text" id="reviewerName" placeholder="الاسم" required>
        </div>
        <div class="form-group" id="branchSelectorContainer" style="display:none;">
          <label>الفرع</label>
          <select id="branchSelect" required>
            <option value="">اختر الفرع</option>
          </select>
        </div>
        <div class="rating-group">
          <label>🍽 تقييم الطعم</label>
          <div class="star-rating" data-target="tasteRating"></div>
          <input type="hidden" id="tasteRating" value="5">
        </div>

        <div class="rating-group">
          <label>🎨 تقييم الشكل</label>
          <div class="star-rating" data-target="presentationRating"></div>
          <input type="hidden" id="presentationRating" value="5">
        </div>

        <div class="rating-group">
          <label>💰 تقييم السعر</label>
          <div class="star-rating" data-target="priceRating"></div>
          <input type="hidden" id="priceRating" value="5">
        </div>
        <div class="form-group">
          <label>تعليق</label>
          <textarea id="reviewComment" rows="3" placeholder="رأيك وجد المنتج؟"></textarea>
        </div>
        <button type="submit" class="btn" style="width:100%;">إرسال التقييم</button>
      </form>
    </div>
  </div>

  <div class="modal" id="thankYouModal">
    <div class="modal-content" style="text-align:center;">
      <h2>شكراً لتقييمك ❤️</h2>
      <p>تم تسجيل رأيك بنجاح، مساهمتك تساعد المطعم على التطوير.</p>
      <button class="btn" onclick="closeThankYouModal()">حسناً</button>
    </div>
  </div>
  <!-- Public footer -->
  <footer class="public-footer">

    <img
      src="https://bkrxqjhzaedpvmrofugz.supabase.co/storage/v1/object/public/rateme-images/1d34886d-5ba1-4143-8945-41fa5f443e4b/products/1781954606839-189719298.png"
      alt="Rate Me" class="footer-logo">

    <div class="footer-title">
      Rate Me قيمني
    </div>

    <div class="footer-subtitle">
      منصة تقييم المطاعم
    </div>

  </footer>

  <script src="review.js"></script>
</body>

</html>
