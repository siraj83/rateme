<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول صاحب المطعم – Rate Me</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-container">
    <a href="https://rateme.ly/" class="logo">
      <img src="https://storage.googleapis.com/msgsndr/0IV0KhyUwqPwxd8GvQ28/media/6957dd4be7c61370dc6562a0.png"
        alt="Rate Me">
    </a>
    <h1>تسجيل دخول صاحب المطعم</h1>

    <form id="loginForm">
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" required placeholder="0912345678">
      </div>

      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" required placeholder="•••••••••">
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>

      <small>ليس لديك حساب؟ <a href="#">تواصل مع الدعم الفني</a></small>
    </form>
  </div>

  <script src="login.js"></script>
</body>

</html>
