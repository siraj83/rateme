<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب – Rate Me</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-container register-page">

    <div class="auth-header">

        <img src="https://bkrxqjhzaedpvmrofugz.supabase.co/storage/v1/object/public/rateme-images/1d34886d-5ba1-4143-8945-41fa5f443e4b/products/1781954606839-189719298.png"
            alt="Rate Me" class="auth-logo">

        <h1 class="auth-title">
            Rate Me قيمني
        </h1>

        <p class="auth-subtitle">
            منصة تقييم المطاعم والعملاء
        </p>
        <p class="auth-tagline">
            اجمع تقييمات عملائك بسهولة عبر QR Code
        </p>

    </div>
    <form id="registerForm">
        <h1>إنشاء حساب مطعم</h1>

        <div class="selected-plan-box" id="selectedPlanBox">
            الباقة المختارة: <strong id="selectedPlanName">-</strong>
        </div>
        <div class="form-group">
            <label>اسم المطعم</label>
            <input type="text" id="restaurantName" required>
        </div>

        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="phone" required placeholder="0912345678">
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" required>
        </div>

        <div class="form-group">
            <label>تأكيد كلمة المرور</label>
            <input type="password" id="confirmPassword" required>
        </div>

        <button type="submit" class="btn" id="registerBtn" style="width:100%;">
            إنشاء الحساب
        </button>

        <div class="auth-link">
            لديك حساب بالفعل؟
            <a href="/login.html">
                تسجيل الدخول
            </a>
        </div>
    </form>

    <script src="register.js"></script>
</body>

</html>
