<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول مسؤول المنصة – Rate Me</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-container auth-page">

    <div class="auth-header">
        <h1 class="auth-title">Rate Me Admin</h1>
        <p class="auth-subtitle">لوحة مسؤول المنصة</p>
    </div>

    <form id="adminLoginForm">
        <h1>تسجيل دخول المسؤول</h1>

        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" required>
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn" id="adminLoginBtn" style="width:100%;">
            دخول
        </button>
    </form>

    <script src="admin-login.js"></script>
</body>

</html>
